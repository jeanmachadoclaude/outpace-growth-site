[build]
  publish = "."

[identity]
  [identity.emails]
    confirmation = "netlify/emails/confirmation.html"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/rocket.mp4"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
